<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Advanced BlobMixer</title>
    <style>
        html,
        body {
            margin: 0;
            overflow: hidden;
            background: transparent !important;
            color: white;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            background: transparent !important;
        }
    </style>
</head>

<body>
    <script src="https://bghuan.cn/static/js/three.min.js"></script>
    <script>
        let animateFlag = true;
        function changeFlag(flag) {
            // console.log("changeFlag:", flag);
            animateFlag = flag;
            animate();
        }
        let scene, camera, renderer, mesh, uniforms;
        let time = 0;

        const params = {
            "distortAmp": 0,
            "speed": 0,
            "rotX": 0.003,
            "rotY": 0.003,
            "freqX": 2,
            "freqY": 2,
            "noiseOffset": 0.5,
            "colorScale": 1.5,
            "lightDirZ": 0.7
        };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 2.5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);  // 透明背景
            document.body.appendChild(renderer.domElement);


            uniforms = {
                time: { value: 0.0 },
                distortAmp: { value: params.distortAmp },
                speed: { value: params.speed },
                freqX: { value: params.freqX },
                freqY: { value: params.freqY },
                noiseOffset: { value: params.noiseOffset },
                colorScale: { value: params.colorScale },
                lightDirZ: { value: params.lightDirZ }
            };

            const material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: vertexShader(),
                fragmentShader: fragmentShader(),
                wireframe: false
            });

            const geometry = new THREE.SphereGeometry(1, 128, 128);
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            // console.log("Animating with params:", params);
            if (!animateFlag) return;
            requestAnimationFrame(animate);
            time += 0.01;
            uniforms.time.value = time;

            mesh.rotation.y += params.rotY;
            mesh.rotation.x += params.rotX;

            renderer.render(scene, camera);
        }

        function vertexShader() {
            return `
      uniform float time;
      uniform float distortAmp;
      uniform float speed;
      uniform float freqX;
      uniform float freqY;
      uniform float noiseOffset;
      varying vec3 vNormal;
      varying vec3 vPosition;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vPosition = position;

        float distort = distortAmp * sin(time * speed + position.y * freqY)
                      + noiseOffset * cos(time * speed * 0.75 + position.x * freqX);
        vec3 newPosition = position + normal * distort;

        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
      }
    `;
        }

        function fragmentShader() {
            return `
      uniform float colorScale;
      uniform float lightDirZ;
      varying vec3 vNormal;
      varying vec3 vPosition;
      void main() {
        float r = 0.5 + 0.5 * sin(vPosition.x * colorScale);
    float g = 0.5 + 0.5 * cos(vPosition.y * colorScale);
    float b = 0.5 + 0.5 * sin(vPosition.z * colorScale);

    gl_FragColor = vec4(r, g, b, 1.0);
      }
    `;
        }
    </script>

</body>

</html>
